name: CI devops 2025

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
 # Étape 3 : build + tests avec Maven
      - name: Build and test with Maven
        run: mvn clean verify         # compile + lance les tests
        working-directory: ./Java/simpleapi   # dossier où se trouve le pom.xml

         
  sonar:   
      needs: test-backend
      runs-on: ubuntu-24.04
      steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build, test and analyze with SonarCloud
        if: github.ref == 'refs/heads/main'
        working-directory: ./Java/simpleapi
        run: > #Test via sonar
          mvn -B verify sonar:sonar
          -Dsonar.branch.name=main
          -Dsonar.projectKey=Kintz53_tp-devops
          -Dsonar.organization=kintz53
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.qualitygate.wait=true
         
  build-and-push-docker-image-backend:
    needs: sonar
    runs-on: ubuntu-24.04
    
    steps:

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              distribution: 'temurin'
              java-version: '21'

        - name: Checkout code
          uses: actions/checkout@v4

        # login Docker (nécessaire même si push conditionnel)
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        # Backend
        - name: Build image and push backend
          uses: docker/build-push-action@v6
          with:
            context: ./Java/simpleapi
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            push: ${{ github.ref == 'refs/heads/main' }}

  build-and-push-docker-image-database:
    runs-on: ubuntu-24.04
    
    steps:
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              distribution: 'temurin'
              java-version: '21'

        - name: Checkout code
          uses: actions/checkout@v4

        # login Docker (nécessaire même si push conditionnel)
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Database
        - name: Build image and push database
          uses: docker/build-push-action@v6
          with:
            context: ./DB
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            push: ${{ github.ref == 'refs/heads/main' }}

  build-and-push-docker-image-HTTPD:
    runs-on: ubuntu-24.04
    
    steps:

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              distribution: 'temurin'
              java-version: '21'

        - name: Checkout code
          uses: actions/checkout@v4

        # login Docker (nécessaire même si push conditionnel)
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        # HTTPD
        - name: Build image and push httpd
          uses: docker/build-push-action@v6
          with:
            context: ./httpd
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
            push: ${{ github.ref == 'refs/heads/main' }}
  deploy: # builds needs
        needs:
          - build-and-push-docker-image-backend
          - build-and-push-docker-image-database
          - build-and-push-docker-image-HTTPD
        runs-on: ubuntu-24.04
        if: github.event_name == 'workflow_dispatch'

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Install Ansible
            run: |
              sudo apt update
              sudo apt install -y ansible

          - name: Install community.docker collection
            run: |
              ansible-galaxy collection install community.docker

          - name: Create SSH key
            run: |
              mkdir -p ~/.ssh
              echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa

          - name: Add server to known hosts
            run: |
              ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

          - name: Create CI inventory
            run: |
              mkdir -p ansible/inventories
              cat > ansible/inventories/setup-ci.yml <<EOF
              all:
                vars:
                  ansible_user: ${{ secrets.SSH_USER }}
                  ansible_ssh_private_key_file: /home/runner/.ssh/id_rsa
                  ansible_python_interpreter: /opt/docker_venv/bin/python
                  db_name: db
                  db_user: usr
                  db_password: pwd
                children:
                  prod:
                    hosts:
                      takima:
                        ansible_host: ${{ secrets.SSH_HOST }}
              EOF

          - name: Deploy with Ansible
            run: |
              cd ansible
              ansible-playbook -i inventories/setup-ci.yml playbook.yml