name: CI devops 2025

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
 # Étape 3 : build + tests avec Maven
      - name: Build and test with Maven
        run: mvn clean verify         # compile + lance les tests
        working-directory: ./Java/simpleapi   # dossier où se trouve le pom.xml

         
  sonar:   
      needs: test-backend
      runs-on: ubuntu-24.04
      steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build, test and analyze with SonarCloud
        if: github.ref == 'refs/heads/main'
        working-directory: ./Java/simpleapi
        run: > #Test via sonar
          mvn -B verify sonar:sonar
          -Dsonar.branch.name=main
          -Dsonar.projectKey=Kintz53_tp-devops
          -Dsonar.organization=kintz53
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.qualitygate.wait=true
  sonar-frontend:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./front
        run: npm install

      - name: Run SonarCloud (frontend)
        working-directory: ./front
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=Kintz53_tp-devops-front \
            -Dsonar.organization=kintz53 \
            -Dsonar.sources=src \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}       
  
  build-and-push-docker-image-backend:
    needs: sonar
    runs-on: ubuntu-24.04
    
    steps:

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              distribution: 'temurin'
              java-version: '21'

        - name: Checkout code
          uses: actions/checkout@v4

        # login Docker (nécessaire même si push conditionnel)
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        # Backend
        - name: Build image and push backend
          uses: docker/build-push-action@v6
          with:
            context: ./Java/simpleapi
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            push: ${{ github.ref == 'refs/heads/main' }}

  build-and-push-docker-image-database:
    runs-on: ubuntu-24.04
    
    steps:
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              distribution: 'temurin'
              java-version: '21'

        - name: Checkout code
          uses: actions/checkout@v4

        # login Docker (nécessaire même si push conditionnel)
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Database
        - name: Build image and push database
          uses: docker/build-push-action@v6
          with:
            context: ./DB
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            push: ${{ github.ref == 'refs/heads/main' }}
  build-and-push-docker-image-front:
    runs-on: ubuntu-24.04
    needs : sonar-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-front:latest
          push: ${{ github.ref == 'refs/heads/main' }}
  build-and-push-docker-image-HTTPD:
    runs-on: ubuntu-24.04
    
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./httpd/Dockerfile
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}