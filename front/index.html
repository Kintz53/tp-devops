<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Students Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Students Dashboard</h1>

    <section>
      <h2>Departments</h2>
      <div id="departments" class="cards"></div>
    </section>

    <section>
      <h2>Students</h2>
      <table>
        <thead>
          <tr>
            <th>First name</th>
            <th>Last name</th>
            <th>Department</th>
          </tr>
        </thead>
        <tbody id="students"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
